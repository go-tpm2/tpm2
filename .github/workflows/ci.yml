# go-tpm2/tpm2 CI — vet, gofmt, 100%-coverage gate, and a multi-arch
# build matrix, on every push/PR. This is a pure-Go (CGO=0) module that is
# NOT part of any workspace, so every Go invocation runs with GOWORK=off.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: off
  CGO_ENABLED: 0

jobs:
  test:
    name: vet + gofmt + 100% coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - run: go version

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: test + coverage gate (100%)
        run: |
          go test -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tee cover.txt
          pct=$(go tool cover -func=cover.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${pct}%"
          # Org-wide hard rule: 100% statement coverage. Never lowered — fill
          # the gap with a test, or delete the unreachable code.
          awk -v p="$pct" 'BEGIN { exit !(p+0 >= 100.0) }' || {
            echo "::error::coverage ${pct}% < 100.0%"; exit 1; }

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, riscv64, loong64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      # Prove the package compiles cleanly on every 64-bit target the
      # go-tpm2 stack supports — no arch-specific breakage slips in.
      - name: go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
